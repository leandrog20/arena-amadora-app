<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena Amadora – Login</title>
<meta name="description" content="Entre na Arena Amadora e participe dos melhores torneios amadores do Brasil.">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Barlow+Condensed:wght@700;900&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/tokens.css">
<link rel="stylesheet" href="/css/utilities.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="./css/shared.css">
<link rel="stylesheet" href="./css/login.css">
</head>
<body>

<div class="bg"></div>
<div class="particles" id="particles"></div>

<div class="page">
  <div class="logo-area">
    <span class="logo-icon">🏆</span>
    <div class="logo-title">Arena Amadora</div>
    <div class="logo-sub">Torneios &amp; Campeonatos</div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" id="tab-login">Entrar</button>
      <button class="tab-btn" id="tab-register">Cadastrar</button>
    </div>

    <!-- LOGIN -->
    <div class="form-panel active" id="panel-login">
      <div class="alert error" id="login-error"></div>
      <div class="field">
        <label>Nome de usuário</label>
        <input type="text" id="login-name" placeholder="Seu nome ou apelido" autocomplete="username">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="btn-login">⚡ Entrar na Arena</button>
    </div>

    <!-- CADASTRO -->
    <div class="form-panel" id="panel-register">
      <div class="alert error" id="reg-error"></div>
      <div class="alert success" id="reg-success">✅ Conta criada! Faça login.</div>
      <div class="field">
        <label>Nome / Apelido</label>
        <input type="text" id="reg-name" placeholder="Seu nome na arena" autocomplete="username">
      </div>
      <div class="field">
        <label>Telefone</label>
        <input type="tel" id="reg-phone" placeholder="(99) 99999-9999" maxlength="15">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
      </div>
      <button class="btn-primary" id="btn-register">🎮 Criar Conta</button>
    </div>
  </div>

  <div class="footer-note">🔒 Seus dados são seguros</div>
</div>

<script src="./js/login.js"></script>
</body>
</html>
