<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena Amadora – Login</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold:#FFD700; --gold2:#FFA500; --dark:#0a0b0f; --card:#12141c;
    --border:rgba(255,215,0,0.18); --text:#e8e8f0; --muted:#6b6d80;
    --danger:#ff4d6d; --success:#00e5a0;
  }
  html,body { height:100%; font-family:'Rajdhani',sans-serif; background:var(--dark); color:var(--text); overflow-x:hidden; }
  .bg { position:fixed; inset:0; z-index:0;
    background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(255,165,0,.07) 0%,transparent 70%),var(--dark); }
  .bg::before { content:''; position:absolute; inset:0;
    background-image:linear-gradient(rgba(255,215,0,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,215,0,.04) 1px,transparent 1px);
    background-size:40px 40px; animation:gridShift 20s linear infinite; }
  @keyframes gridShift { 100%{transform:translateY(40px)} }
  .particles { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
  .particle { position:absolute; width:2px; height:2px; border-radius:50%; background:var(--gold); animation:floatUp linear infinite; opacity:0; }
  @keyframes floatUp { 0%{transform:translateY(100vh) scale(0);opacity:0} 10%{opacity:.6} 90%{opacity:.2} 100%{transform:translateY(-10vh) scale(1.5);opacity:0} }
  .page { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px 16px; }
  .logo-area { text-align:center; margin-bottom:32px; animation:fadeDown .6s ease both; }
  .logo-icon { font-size:56px; line-height:1; filter:drop-shadow(0 0 20px rgba(255,215,0,.6)); animation:pulse 3s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{filter:drop-shadow(0 0 20px rgba(255,215,0,.6))} 50%{filter:drop-shadow(0 0 35px rgba(255,165,0,.9))} }
  .logo-title { font-family:'Orbitron',sans-serif; font-weight:900; font-size:clamp(22px,6vw,30px);
    background:linear-gradient(135deg,#FFD700,#FFA500,#FF6B35); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    letter-spacing:2px; margin-top:8px; }
  .logo-sub { font-size:13px; color:var(--muted); letter-spacing:4px; text-transform:uppercase; margin-top:4px; }
  .card { width:100%; max-width:420px; background:var(--card); border:1px solid var(--border); border-radius:20px; padding:32px 28px;
    box-shadow:0 0 60px rgba(255,165,0,.06),0 20px 60px rgba(0,0,0,.5); animation:fadeUp .7s ease both .2s; position:relative; overflow:hidden; }
  .card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--gold),var(--gold2),transparent); }
  .tabs { display:flex; background:rgba(255,255,255,.04); border-radius:10px; padding:4px; margin-bottom:28px; border:1px solid rgba(255,255,255,.06); }
  .tab-btn { flex:1; padding:10px; border:none; background:transparent; color:var(--muted); font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:600; letter-spacing:1px; text-transform:uppercase; border-radius:7px; cursor:pointer; transition:all .25s; }
  .tab-btn.active { background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,165,0,.1)); color:var(--gold); border:1px solid rgba(255,215,0,.3); box-shadow:0 2px 12px rgba(255,165,0,.15); }
  .form-panel { display:none; }
  .form-panel.active { display:block; animation:fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .field { margin-bottom:18px; }
  .field label { display:block; font-size:12px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:7px; }
  .field input { width:100%; padding:13px 16px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); border-radius:10px; color:var(--text); font-family:'Rajdhani',sans-serif; font-size:16px; font-weight:500; outline:none; transition:all .25s; }
  .field input:focus { border-color:rgba(255,215,0,.4); background:rgba(255,215,0,.04); box-shadow:0 0 0 3px rgba(255,215,0,.08); }
  .field input::placeholder { color:var(--muted); }
  .btn-primary { width:100%; padding:15px; border:none; border-radius:12px; background:linear-gradient(135deg,#FFD700,#FFA500); color:#0a0b0f; font-family:'Orbitron',sans-serif; font-size:14px; font-weight:700; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:all .25s; box-shadow:0 4px 20px rgba(255,165,0,.3); margin-top:8px; position:relative; overflow:hidden; }
  .btn-primary:disabled { opacity:.6; cursor:not-allowed; transform:none !important; }
  .btn-primary:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 30px rgba(255,165,0,.45); }
  .alert { padding:12px 16px; border-radius:10px; font-size:14px; font-weight:600; margin-bottom:16px; display:none; align-items:center; gap:8px; }
  .alert.show { display:flex; animation:fadeIn .3s ease; }
  .alert.error { background:rgba(255,77,109,.12); border:1px solid rgba(255,77,109,.3); color:var(--danger); }
  .alert.success { background:rgba(0,229,160,.1); border:1px solid rgba(0,229,160,.3); color:var(--success); }
  .footer-note { text-align:center; margin-top:20px; font-size:12px; color:var(--muted); letter-spacing:1px; animation:fadeUp .8s ease both .5s; }
  @keyframes fadeDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div class="bg"></div>
<div class="particles" id="particles"></div>
<div class="page">
  <div class="logo-area">
    <div class="logo-icon">🏆</div>
    <div class="logo-title">Arena Amadora</div>
    <div class="logo-sub">Torneios &amp; Campeonatos</div>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" id="tab-login">Entrar</button>
      <button class="tab-btn" id="tab-register">Cadastrar</button>
    </div>

    <!-- LOGIN -->
    <div class="form-panel active" id="panel-login">
      <div class="alert error" id="login-error"></div>
      <div class="field"><label>Nome de usuário</label><input type="text" id="login-name" placeholder="Seu nome ou apelido" autocomplete="username"></div>
      <div class="field"><label>Senha</label><input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="btn-primary" id="btn-login">⚡ Entrar na Arena</button>
    </div>

    <!-- REGISTER -->
    <div class="form-panel" id="panel-register">
      <div class="alert error" id="reg-error"></div>
      <div class="alert success" id="reg-success">✅ Conta criada! Faça login.</div>
      <div class="field"><label>Nome / Apelido</label><input type="text" id="reg-name" placeholder="Seu nome na arena" autocomplete="username"></div>
      <div class="field"><label>Telefone</label><input type="tel" id="reg-phone" placeholder="(99) 99999-9999" maxlength="15"></div>
      <div class="field"><label>Senha</label><input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" autocomplete="new-password"></div>
      <button class="btn-primary" id="btn-register">🎮 Criar Conta</button>
    </div>
  </div>
  <div class="footer-note">🔒 Seus dados são seguros</div>
</div>

<script>
  // Particles
  const pc = document.getElementById('particles');
  for (let i=0;i<30;i++){const p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'vw';p.style.animationDuration=(6+Math.random()*14)+'s';p.style.animationDelay=(Math.random()*15)+'s';p.style.width=p.style.height=(1+Math.random()*3)+'px';pc.appendChild(p);}

  // Phone mask
  document.getElementById('reg-phone').addEventListener('input',function(){let v=this.value.replace(/\D/g,'');if(v.length>11)v=v.slice(0,11);if(v.length>6)v='('+v.slice(0,2)+') '+v.slice(2,7)+'-'+v.slice(7);else if(v.length>2)v='('+v.slice(0,2)+') '+v.slice(2);else if(v.length>0)v='('+v;this.value=v;});

  // Tabs
  document.getElementById('tab-login').addEventListener('click',()=>switchTab('login'));
  document.getElementById('tab-register').addEventListener('click',()=>switchTab('register'));
  function switchTab(t){document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.form-panel').forEach(p=>p.classList.remove('active'));document.getElementById('tab-'+t).classList.add('active');document.getElementById('panel-'+t).classList.add('active');}

  function showAlert(id,msg,type='error'){const el=document.getElementById(id);el.textContent=(type==='error'?'⚠️ ':'')+msg;el.className='alert '+type+' show';}
  function hideAlert(id){document.getElementById(id).className='alert';}

  // Register
  document.getElementById('btn-register').addEventListener('click', async () => {
    const name=document.getElementById('reg-name').value.trim();
    const phone=document.getElementById('reg-phone').value.trim();
    const password=document.getElementById('reg-pass').value;
    hideAlert('reg-error'); hideAlert('reg-success');
    if(!name||!phone||!password) return showAlert('reg-error','Preencha todos os campos.');
    if(password.length<6) return showAlert('reg-error','Senha deve ter ao menos 6 caracteres.');
    const btn=document.getElementById('btn-register');
    btn.disabled=true; btn.textContent='Criando conta...';
    try {
      const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,phone,password})});
      const d=await r.json();
      if(!r.ok) return showAlert('reg-error', d.error||'Erro ao criar conta.');
      showAlert('reg-success','✅ Conta criada! Faça login.','success');
      document.getElementById('reg-name').value='';document.getElementById('reg-phone').value='';document.getElementById('reg-pass').value='';
      setTimeout(()=>switchTab('login'),1500);
    } catch(e){ showAlert('reg-error','Erro de conexão. Tente novamente.'); }
    finally { btn.disabled=false; btn.textContent='🎮 Criar Conta'; }
  });

  // Login
  document.getElementById('btn-login').addEventListener('click', doLogin);
  document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

  async function doLogin(){
    const name=document.getElementById('login-name').value.trim();
    const password=document.getElementById('login-pass').value;
    hideAlert('login-error');
    if(!name||!password) return showAlert('login-error','Preencha todos os campos.');
    const btn=document.getElementById('btn-login');
    btn.disabled=true; btn.textContent='Entrando...';
    try {
      const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,password})});
      const d=await r.json();
      if(!r.ok) return showAlert('login-error', d.error||'Credenciais inválidas.');
      window.location.href = d.role==='admin' ? '/admin.html' : '/index.html';
    } catch(e){ showAlert('login-error','Erro de conexão. Tente novamente.'); }
    finally { btn.disabled=false; btn.textContent='⚡ Entrar na Arena'; }
  }

  // Verifica sessão
  (async()=>{
    try{const r=await fetch('/api/auth/me');if(r.ok){const d=await r.json();window.location.href=d.role==='admin'?'/admin.html':'/index.html';}}catch(e){}
  })();
</script>
</body>
</html>
